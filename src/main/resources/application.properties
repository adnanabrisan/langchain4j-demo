spring.application.name=langchain-demo
server.port=8082

langchain4j.ollama.chat-model.base-url=http://localhost:11434
langchain4j.ollama.chat-model.model-name=llama3.1
langchain4j.ollama.chat-model.temperature=0.8

ollama.image-processor.model-name=llava

# Image generation via Ollama (e.g. pull a model first:  ollama pull x/z-image-turbo)
ollama.image.base-url=http://localhost:11434
ollama.image.model-name=x/z-image-turbo
ollama.image.width=512
ollama.image.height=384
ollama.image.steps=20
ollama.image.output-dir=${user.home}/langchain-demo-images

# RAG: Ollama embedding model (pull first:  ollama pull nomic-embed-text)
ollama.embedding.base-url=http://localhost:11434
ollama.embedding.model-name=nomic-embed-text

# RAG: chunking + retrieval tuning
rag.max-segment-size-in-chars=1000
rag.max-overlap-size-in-chars=200
rag.max-results=5
rag.min-score=0.6
# Max upload size for /assistant/ingest
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

logging.level.dev.langchain4j=DEBUG

management.endpoints.web.exposure.include=*
management.tracing.sampling.probability=1
